<!DOCTYPE html>
<!--
  packages/renderer/index.html
  React renderer entry — dark dockable workspace shell (Plan 00-04).

  PATH B (native-in-renderer, sandbox:false + nodeIntegration:true + contextIsolation:false):
    The renderer has full Node.js access and requires @swg/native-core directly.
    COOP/COEP headers are set by the Electron main process (before loadURL).
    crossOriginIsolated=true ensures SharedArrayBuffer is available.

  The proof hooks (window.__*) are set by StatusBar (single owner).
  Consumed by 00-05 E2E spec (03-sab-roundtrip.spec.ts).
-->
<html lang="en" data-theme="cyan">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      background set immediately to avoid white flash before React hydrates.
      Must match --color-bg (#181818).
    -->
    <style>
      html, body { background: #181818; margin: 0; padding: 0; height: 100%; overflow: hidden; }
    </style>
    <title>SWG Toolkit</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
